{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "frontend.fullname" . }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: {{ .Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "frontend.fullname" . }}
                port:
                  number: {{ .Values.service.port }}

          - path: /api/assets
            pathType: Prefix
            backend:
              service:
                name: asset-service
                port:
                  number: 5001

          - path: /api/incidents
            pathType: Prefix
            backend:
              service:
                name: incident-service
                port:
                  number: 5002

          - path: /api/tenants
            pathType: Prefix
            backend:
              service:
                name: tenant-service
                port:
                  number: 5003
{{- end }}
