redis:
  enabled: true
  replicaCount: 1

  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 6379

  persistence:
    enabled: true
    storageClass: "standard"
    size: "1Gi"

  storageClass:
    provisioner: k8s.io/minikube-hostpath
    reclaimPolicy: Retain
    volumeBindingMode: Immediate
    allowVolumeExpansion: true

  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

  livenessProbe:
    enabled: true
    type: tcpSocket
    port: 6379
    initialDelaySeconds: 10
    periodSeconds: 10

  readinessProbe:
    enabled: true
    type: tcpSocket
    port: 6379
    initialDelaySeconds: 5
    periodSeconds: 5

  nameOverride: "redis"
  fullnameOverride: ""
