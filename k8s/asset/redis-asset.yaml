apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-asset
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-asset
  template:
    metadata:
      labels:
        app: redis-asset
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: redis-asset
spec:
  selector:
    app: redis-asset
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
