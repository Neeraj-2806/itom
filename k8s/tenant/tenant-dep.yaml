apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tenant-service
  template:
    metadata:
      labels:
        app: tenant-service
    spec:
      containers:
        - name: tenant-service
          image: seven-microservices-tenant-service:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 5003
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: tenant-config
                  key: PORT
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: tenant-config
                  key: REDIS_URL
---
apiVersion: v1
kind: Service
metadata:
  name: tenant-service
spec:
  selector:
    app: tenant-service
  ports:
    - port: 5003
      targetPort: 5003
  type: ClusterIP
