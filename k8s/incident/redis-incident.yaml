apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-incident
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-incident
  template:
    metadata:
      labels:
        app: redis-incident
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-incident
spec:
  selector:
    app: redis-incident
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
