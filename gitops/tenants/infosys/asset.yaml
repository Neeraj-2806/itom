apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: asset-infosys
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Neeraj-2806/itom.git
    targetRevision: main
    path: helm/asset
    helm:
      releaseName: asset-service
      values: |
        replicaCount: 2

        image:
          repository: neeraj2806/eight-asset-itom
          tag: "v1"
          pullPolicy: IfNotPresent

        service:
          type: ClusterIP
          port: 5001
          targetPort: 5001

        containerPort: 5001

        env:
          PORT: "5001"
          REDIS_URL: "redis://redis-infosys:6379"
          INCIDENT_SERVICE_URL: "http://incident-service:5002"
          TENANT_SERVICE_URL: "http://tenant-service:5003"

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        serviceAccount:
          create: true
          automount: false
          name: ""

        strategy:
          rollingUpdate:
            maxUnavailable: 0
            maxSurge: 1

        livenessProbe:
          enabled: false
          path: /
          initialDelaySeconds: 30
          periodSeconds: 10

        readinessProbe:
          enabled: false
          path: /
          initialDelaySeconds: 10
          periodSeconds: 5

        autoscaling:
          enabled: true
          minReplicas: 2
          maxReplicas: 5
          targetCPUUtilizationPercentage: 70
          targetMemoryUtilizationPercentage: 80
  destination:
    server: https://kubernetes.default.svc
    namespace: tenant-infosys
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
