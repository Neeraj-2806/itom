apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-infosys
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Neeraj-2806/itom.git
    targetRevision: main
    path: helm/frontend
    helm:
      releaseName: frontend-service
      values: |
        replicaCount: 1

        nameOverride: "frontend"
        fullnameOverride: ""

        image:
          repository: neeraj2806/eight-frontend-itom
          tag: "v1"
          pullPolicy: IfNotPresent

        service:
          type: NodePort
          containerPort: 80
          port: 80
          targetPort: 80

        env:
          PORT: "80"
          ASSET_SERVICE_URL: "http://asset-service:5001"
          INCIDENT_SERVICE_URL: "http://incident-service:5002"
          TENANT_SERVICE_URL: "http://tenant-service:5003"

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        serviceAccount:
          create: true
          automount: false
          name: ""

        strategy:
          rollingUpdate:
            maxUnavailable: 0
            maxSurge: 1

        livenessProbe:
          enabled: false
          path: /
          initialDelaySeconds: 30
          periodSeconds: 10

        readinessProbe:
          enabled: false
          path: /
          initialDelaySeconds: 10
          periodSeconds: 5

        autoscaling:
          enabled: true
          minReplicas: 2
          maxReplicas: 5
          targetCPUUtilizationPercentage: 70
          targetMemoryUtilizationPercentage: 80

        ingress:
          enabled: true
          className: nginx
          host: infosys.itom.local
          path: /
          pathType: Prefix
          annotations:
            nginx.ingress.kubernetes.io/rewrite-target: /
  destination:
    server: https://kubernetes.default.svc
    namespace: tenant-infosys
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
